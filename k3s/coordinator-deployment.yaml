apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fedfod-storage-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: fedfod-coordinator-service
spec:
  selector:
    app: fedfod-coordinator
  ports:
    - name: http-dashboard
      protocol: TCP
      port: 8000
      targetPort: 8000
    - name: grpc-training
      protocol: TCP
      port: 8082
      targetPort: 8082
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fedfod-coordinator-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fedfod-coordinator
  template:
    metadata:
      labels:
        app: fedfod-coordinator
    spec:
      containers:
        - name: coordinator
          image: fedfod:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
            - containerPort: 8082
          volumeMounts:
            - name: storage-volume
              mountPath: /app/checkpoints
            - name: logs-volume
              mountPath: /app/logs
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
      volumes:
        - name: storage-volume
          persistentVolumeClaim:
            claimName: fedfod-storage-pvc
        - name: logs-volume
          emptyDir: {}
